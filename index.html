<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>식사 출석 체크</title>
  <style>
    :root {
      --bg-1: #f5f7ff;
      --bg-2: #eef2ff;
      --card-bg: rgba(255, 255, 255, 0.92);
      --text: #182230;
      --muted: #667085;
      --line: rgba(24, 34, 48, 0.08);
      --primary: #4f46e5;
      --primary-2: #7c3aed;
      --primary-soft: rgba(79, 70, 229, 0.10);
      --success-bg: #ecfdf3;
      --success-text: #027a48;
      --error-bg: #fef3f2;
      --error-text: #b42318;
      --info-bg: #eef4ff;
      --info-text: #3538cd;
      --shadow: 0 20px 50px rgba(79, 70, 229, 0.16);
      --radius-xl: 26px;
      --radius-md: 14px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(191, 219, 254, 0.9) 0%, transparent 30%),
        radial-gradient(circle at top right, rgba(221, 214, 254, 0.9) 0%, transparent 28%),
        linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 100%);
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .wrap {
      width: 100%;
      max-width: 460px;
    }

    .card {
      position: relative;
      background: var(--card-bg);
      border: 1px solid rgba(255, 255, 255, 0.75);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      padding: 28px 22px 22px;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0 auto auto 0;
      width: 100%;
      height: 6px;
      background: linear-gradient(90deg, var(--primary) 0%, var(--primary-2) 100%);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--primary-soft);
      color: #3730a3;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0;
      font-size: 30px;
      line-height: 1.2;
      letter-spacing: -0.03em;
    }

    .desc {
      margin: 10px 0 24px;
      font-size: 15px;
      line-height: 1.6;
      color: var(--muted);
    }

    .form {
      display: grid;
      gap: 16px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    label {
      font-size: 14px;
      font-weight: 700;
    }

    .control {
      width: 100%;
      height: 54px;
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      background: rgba(255, 255, 255, 0.98);
      padding: 0 16px;
      font-size: 16px;
      color: var(--text);
      outline: none;
    }

    .control:focus {
      border-color: rgba(79, 70, 229, 0.55);
      box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.12);
    }

    .submit-btn {
      margin-top: 4px;
      width: 100%;
      height: 56px;
      border: none;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-2) 100%);
      color: #fff;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 16px 32px rgba(79, 70, 229, 0.24);
    }

    .submit-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .message {
      display: none;
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 14px;
      font-size: 14px;
      font-weight: 600;
      line-height: 1.5;
      white-space: pre-line;
    }

    .message.show { display: block; }
    .message.info { background: var(--info-bg); color: var(--info-text); }
    .message.success { background: var(--success-bg); color: var(--success-text); }
    .message.error { background: var(--error-bg); color: var(--error-text); }

    .footer-note {
      margin: 14px 0 0;
      text-align: center;
      font-size: 12px;
      color: #98a2b3;
    }

    @media (max-width: 480px) {
      body { padding: 14px; align-items: stretch; }
      .wrap { max-width: 100%; }
      .card { padding: 24px 18px 18px; border-radius: 22px; }
      h1 { font-size: 26px; }
      .desc { font-size: 14px; }
      .control, .submit-btn { height: 52px; font-size: 15px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="badge">🍽️ 식사 기록</div>
      <h1>식사 출석 체크</h1>
      <p class="desc">학년, 반, 이름을 입력한 뒤 제출하세요.</p>

      <form id="attendanceForm" class="form">
        <div class="field">
          <label for="grade">학년</label>
          <select id="grade" class="control" required>
            <option value="">학년 선택</option>
            <option value="1">1학년</option>
            <option value="2">2학년</option>
            <option value="3">3학년</option>
            <option value="4">4학년</option>
            <option value="5">5학년</option>
            <option value="6">6학년</option>
          </select>
        </div>

        <div class="field">
          <label for="classroom">반</label>
          <select id="classroom" class="control" required>
            <option value="">반 선택</option>
            <option value="1">1반</option>
            <option value="2">2반</option>
          </select>
        </div>

        <div class="field">
          <label for="name">이름</label>
          <input id="name" type="text" class="control" maxlength="20" placeholder="이름 입력" required />
        </div>

        <button id="submitBtn" type="submit" class="submit-btn">제출</button>
      </form>

      <div id="messageBox" class="message info show">학년, 반, 이름을 입력한 뒤 제출하세요.</div>
      <p class="footer-note">제출한 내용은 구글 시트에 저장됩니다.</p>
    </div>
  </div>

  <script>
    const form = document.getElementById('attendanceForm');
    const grade = document.getElementById('grade');
    const classroom = document.getElementById('classroom');
    const nameInput = document.getElementById('name');
    const submitBtn = document.getElementById('submitBtn');
    const messageBox = document.getElementById('messageBox');

    let isSubmitting = false;

    function showMessage(type, text) {
      messageBox.className = 'message show ' + type;
      messageBox.textContent = text;
    }

    function validateForm() {
      const name = nameInput.value.trim();
      if (!grade.value || !classroom.value || !name) {
        showMessage('error', '학년, 반, 이름을 입력한 뒤 제출하세요.');
        return false;
      }
      return true;
    }

    form.addEventListener('submit', function(event) {
      event.preventDefault();

      if (isSubmitting) return;
      if (!validateForm()) return;

      isSubmitting = true;
      submitBtn.disabled = true;
      submitBtn.textContent = '제출 중...';
      showMessage('info', '제출 중입니다...');

      google.script.run
        .withSuccessHandler(function(response) {
          if (response && response.success) {
            form.reset();
            showMessage('success', '제출이 완료되었습니다.');
          } else {
            const detail = response && response.error ? '\n' + response.error : '';
            showMessage('error', (response && response.message ? response.message : '제출에 실패했습니다.') + detail);
          }
          submitBtn.disabled = false;
          submitBtn.textContent = '제출';
          isSubmitting = false;
        })
        .withFailureHandler(function(error) {
          showMessage('error', '연결 중 오류가 발생했습니다.\n' + error.message);
          submitBtn.disabled = false;
          submitBtn.textContent = '제출';
          isSubmitting = false;
        })
        .submitAttendance({
          grade: grade.value,
          classroom: classroom.value,
          name: nameInput.value.trim()
        });
    });
  </script>
</body>
</html>
