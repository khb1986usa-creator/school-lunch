<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>식사 출석 체크</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --bg-color: #f5f7fa;
            --card-bg: #ffffff;
            --text-color: #333;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background-color: var(--card-bg);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            color: var(--primary-color);
        }

        .input-group {
            margin-bottom: 1rem;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            font-weight: 600;
        }

        select, input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
            transition: border 0.2s;
        }

        select:focus, input:focus {
            border-color: var(--primary-color);
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 1rem;
            transition: background 0.3s;
        }

        button:disabled {
            background-color: #ccc;
        }

        .info-text {
            font-size: 0.85rem;
            color: #666;
            margin-top: 1rem;
        }

        #resultView {
            display: none;
        }

        .success-icon {
            font-size: 3rem;
            color: #4CAF50;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="formView">
            <h1>식사 출석 체크</h1>
            <div class="input-group">
                <label>학년</label>
                <select id="grade">
                    <option value="">학년 선택</option>
                    <option value="1">1학년</option>
                    <option value="2">2학년</option>
                    <option value="3">3학년</option>
                </select>
            </div>
            <div class="input-group">
                <label>반</label>
                <select id="classNum">
                    <option value="">반 선택</option>
                    <script>
                        for(let i=1; i<=10; i++) document.write(`<option value="${i}">${i}반</option>`);
                    </script>
                </select>
            </div>
            <div class="input-group">
                <label>이름</label>
                <input type="text" id="userName" placeholder="이름을 입력하세요">
            </div>
            <p class="info-text">학년, 반, 이름을 입력한 뒤 제출하세요.</p>
            <button onclick="submitData()" id="submitBtn">제출하기</button>
        </div>

        <div id="resultView">
            <div class="success-icon">✓</div>
            <h2>제출 완료!</h2>
            <p>오늘의 급식 기록이 완료되었습니다.<br>맛있게 드세요!</p>
        </div>
    </div>

    <script>
        // 배포한 구글 앱스 스크립트 URL을 여기에 붙여넣으세요
        const GAS_URL = "여기에_구글_앱스_스크립트_URL_입력";

        async function submitData() {
            const grade = document.getElementById('grade').value;
            const classNum = document.getElementById('classNum').value;
            const name = document.getElementById('userName').value.trim();
            const btn = document.getElementById('submitBtn');

            if (!grade || !classNum || !name) {
                alert("학년, 반, 이름을 모두 확인해주세요.");
                return;
            }

            btn.disabled = true;
            btn.innerText = "처리 중...";

            const payload = {
                grade: grade,
                classNum: classNum,
                name: name
            };

            try {
                // fetch를 이용한 데이터 전송 (CORS 대응을 위해 no-cors 모드 사용 가능성이 있으나 GAS는 보통 JSONP나 직접 호출 사용)
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });

                document.getElementById('formView').style.display = 'none';
                document.getElementById('resultView').style.display = 'block';
            } catch (error) {
                console.error(error);
                alert("제출 중 오류가 발생했습니다. 다시 시도해 주세요.");
                btn.disabled = false;
                btn.innerText = "제출하기";
            }
        }
    </script>
</body>
</html>
